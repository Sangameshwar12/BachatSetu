spring:
  application:
    name: bachatsetu-backend
  profiles:
    default: local
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/bachatsetu}
    username: ${DATABASE_USERNAME:bachatsetu}
    password: ${DATABASE_PASSWORD:bachatsetu}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: BachatSetuPool
      maximum-pool-size: ${DATABASE_MAX_POOL_SIZE:10}
      minimum-idle: ${DATABASE_MIN_IDLE:2}
      connection-timeout: 30s
      validation-timeout: 5s
      idle-timeout: 10m
      max-lifetime: 30m
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    validate-on-migrate: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        order_inserts: true
        order_updates: true
        jdbc.batch_size: ${DATABASE_BATCH_SIZE:50}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 2s
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

info:
  application:
    name: ${spring.application.name}
    version: "@project.version@"

logging:
  level:
    root: INFO
    in.bachatsetu.backend: INFO

bachatsetu:
  authentication:
    otp-validity: 5m
    resend-limit: 3
    verify-limit: 5
    hash-strength: ${AUTH_OTP_BCRYPT_STRENGTH:12}
