spring:
  application:
    name: bachatsetu-backend
  profiles:
    default: local
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/bachatsetu}
    username: bachatsetu
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: BachatSetuPool
      maximum-pool-size: ${DATABASE_MAX_POOL_SIZE:10}
      minimum-idle: ${DATABASE_MIN_IDLE:2}
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    validate-on-migrate: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        order_inserts: true
        order_updates: true
        jdbc.batch_size: ${DATABASE_BATCH_SIZE:50}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 2s
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_EXPOSURE:health,info,metrics,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

info:
  application:
    name: ${spring.application.name}
    version: "@project.version@"

logging:
  level:
    root: INFO
    in.bachatsetu.backend: INFO

bachatsetu:
  authentication:
    otp-validity: 5m
    resend-limit: 3
    verify-limit: 5
    hash-strength: ${AUTH_OTP_BCRYPT_STRENGTH:12}
    rest:
      enabled: ${AUTH_REST_ENABLED:true}
    token:
      enabled: ${AUTH_TOKEN_ENABLED:true}
      access-token-expiry: ${AUTH_ACCESS_TOKEN_EXPIRY:15m}
      refresh-token-expiry: ${AUTH_REFRESH_TOKEN_EXPIRY:30d}
      issuer: ${AUTH_JWT_ISSUER:bachatsetu}
      audience: ${AUTH_JWT_AUDIENCE:bachatsetu-api}
      signing-secret: ${AUTH_JWT_SIGNING_SECRET:}
      clock-skew: ${AUTH_JWT_CLOCK_SKEW:30s}
      hash-strength: ${AUTH_REFRESH_HASH_STRENGTH:12}
      jwt-version: 1
    security:
      header-name: ${AUTH_HEADER_NAME:Authorization}
      bearer-prefix: ${AUTH_BEARER_PREFIX:Bearer }
      clock-skew: ${AUTH_JWT_CLOCK_SKEW:30s}
      password-hash-strength: ${AUTH_PASSWORD_HASH_STRENGTH:12}
      public-endpoints:
        - /actuator/health
        - /actuator/health/**
        - /v3/api-docs/**
        - /swagger-ui/**
        - /swagger-ui.html
        - /api/v1/auth/**
        - /api/v1/payments/webhooks/**
        - /api/v1/join/**
      cors:
        allowed-origins: ${AUTH_CORS_ALLOWED_ORIGINS:http://localhost:3000}
        allowed-methods: ${AUTH_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
        allowed-headers: ${AUTH_CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,X-Request-ID}
        exposed-headers: ${AUTH_CORS_EXPOSED_HEADERS:X-Request-ID}
        allow-credentials: ${AUTH_CORS_ALLOW_CREDENTIALS:false}
        max-age: ${AUTH_CORS_MAX_AGE:1h}
  sms:
    provider: ${SMS_PROVIDER:MSG91}
    retry-count: ${SMS_RETRY_COUNT:2}
    connect-timeout: ${SMS_CONNECT_TIMEOUT:3s}
    read-timeout: ${SMS_READ_TIMEOUT:5s}
    msg91:
      auth-key: ${MSG91_AUTH_KEY:}
      template-id: ${MSG91_TEMPLATE_ID:}
      sender-id: ${MSG91_SENDER_ID:}
    fast2sms:
      api-key: ${FAST2SMS_API_KEY:}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      phone-number: ${TWILIO_PHONE_NUMBER:}
  group:
    rest:
      enabled: ${GROUP_REST_ENABLED:true}
  member:
    rest:
      enabled: ${MEMBER_REST_ENABLED:true}
  user:
    rest:
      enabled: ${USER_REST_ENABLED:true}
  invitation:
    validity: ${INVITATION_VALIDITY:P7D}
    rest:
      enabled: ${INVITATION_REST_ENABLED:true}
  dashboard:
    rest:
      enabled: ${DASHBOARD_REST_ENABLED:true}
  support:
    rest:
      enabled: ${SUPPORT_REST_ENABLED:true}
  platform-operations:
    rest:
      enabled: ${PLATFORM_OPERATIONS_REST_ENABLED:true}
  payment:
    rest:
      enabled: ${PAYMENT_REST_ENABLED:true}
    gateway:
      enabled: ${PAYMENT_GATEWAY_ENABLED:true}
      default-provider: ${PAYMENT_GATEWAY_DEFAULT_PROVIDER:RAZORPAY}
      razorpay:
        key-id: ${RAZORPAY_KEY_ID:}
        secret: ${RAZORPAY_SECRET:}
        webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
      stripe:
        api-key: ${STRIPE_API_KEY:}
        webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
      cashfree:
        client-id: ${CASHFREE_CLIENT_ID:}
        client-secret: ${CASHFREE_CLIENT_SECRET:}
        webhook-secret: ${CASHFREE_WEBHOOK_SECRET:}
  draw:
    rest:
      enabled: ${DRAW_REST_ENABLED:true}
  receipt:
    rest:
      enabled: ${RECEIPT_REST_ENABLED:true}
    storage-upload:
      enabled: ${RECEIPT_STORAGE_UPLOAD_ENABLED:false}
  notification:
    rest:
      enabled: ${NOTIFICATION_REST_ENABLED:true}
  auction:
    rest:
      enabled: ${AUCTION_REST_ENABLED:true}
  automation:
    enabled: ${AUTOMATION_ENABLED:true}
    draw:
      cron: ${AUTOMATION_DRAW_CRON:0 */15 * * * *}
    payment-reminder:
      cron: ${AUTOMATION_PAYMENT_REMINDER_CRON:0 0 9 * * *}
      days-ahead: ${AUTOMATION_PAYMENT_REMINDER_DAYS_AHEAD:3}
    overdue-reminder:
      cron: ${AUTOMATION_OVERDUE_REMINDER_CRON:0 30 9 * * *}
    cleanup:
      cron: ${AUTOMATION_CLEANUP_CRON:0 0 3 * * *}
  storage:
    enabled: ${STORAGE_ENABLED:true}
    default-provider: ${STORAGE_DEFAULT_PROVIDER:LOCAL}
    local:
      path: ${STORAGE_LOCAL_PATH:./data/storage}
    aws:
      bucket: ${STORAGE_AWS_BUCKET:}
      region: ${STORAGE_AWS_REGION:}
      access-key-id: ${STORAGE_AWS_ACCESS_KEY_ID:}
      secret-access-key: ${STORAGE_AWS_SECRET_ACCESS_KEY:}
    azure:
      account-name: ${STORAGE_AZURE_ACCOUNT_NAME:}
      account-key: ${STORAGE_AZURE_ACCOUNT_KEY:}
      container-name: ${STORAGE_AZURE_CONTAINER_NAME:}
    gcp:
      bucket: ${STORAGE_GCP_BUCKET:}
      project-id: ${STORAGE_GCP_PROJECT_ID:}
      credentials-json: ${STORAGE_GCP_CREDENTIALS_JSON:}
  audit:
    rest:
      enabled: ${AUDIT_REST_ENABLED:true}
  admin:
    enabled: ${ADMIN_ENABLED:true}
    page-size-default: ${ADMIN_PAGE_SIZE_DEFAULT:20}
    page-size-max: ${ADMIN_PAGE_SIZE_MAX:100}
    analytics:
      enabled: ${ADMIN_ANALYTICS_ENABLED:true}
    platform-config:
      enabled: ${ADMIN_PLATFORM_CONFIG_ENABLED:true}
  cache:
    enabled: ${CACHE_ENABLED:true}
    otp-ttl: ${CACHE_OTP_TTL:5m}
    rate-limit-ttl: ${CACHE_RATE_LIMIT_TTL:1m}
    session-ttl: ${CACHE_SESSION_TTL:30m}
    config-ttl: ${CACHE_CONFIG_TTL:10m}
