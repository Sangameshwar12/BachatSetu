spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: ${DATABASE_MAX_POOL_SIZE:30}
      minimum-idle: ${DATABASE_MIN_IDLE:5}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  flyway:
    clean-disabled: true

bachatsetu:
  authentication:
    security:
      # Overrides (not merges) the base public-endpoints list — Swagger UI and the raw OpenAPI
      # document are reconnaissance surfaces with no reason to be unauthenticated in production;
      # every other environment (local/dev/test) still gets them via the base application.yml list.
      public-endpoints:
        - /actuator/health
        - /actuator/health/**
        - /actuator/metrics
        - /actuator/metrics/**
        - /actuator/prometheus
        - /api/v1/auth/**
        - /api/v1/payments/webhooks/**
        - /api/v1/join/**

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    in.bachatsetu.backend: INFO
