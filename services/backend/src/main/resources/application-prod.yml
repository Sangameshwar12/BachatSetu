spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: ${DATABASE_MAX_POOL_SIZE:30}
      minimum-idle: ${DATABASE_MIN_IDLE:5}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  flyway:
    clean-disabled: true

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    in.bachatsetu.backend: INFO
