# Production edge configuration for BachatSetu: a single reverse proxy in front of the
# frontend (Next.js standalone server) and backend (Spring Boot) containers.
#
# Responsibilities kept here, deliberately not duplicated in the application containers:
#   - TLS termination (certificate paths are placeholders — see
#     docs/deployment/production-deployment-guide.md for how they are provisioned)
#   - gzip compression for text-based responses
#   - long-lived cache headers for hashed Next.js static assets
#   - a small set of defense-in-depth security headers
#   - routing: everything under /api, /actuator, /v3/api-docs, /swagger-ui goes to the
#     backend; everything else goes to the frontend
#
# See docs/deployment/docker-guide.md for how this file is mounted into the `nginx`
# service defined in docker-compose.prod.yml.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $request_id [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    map $http_x_request_id $request_id {
        default   $http_x_request_id;
        ""        $request_id;
    }

    upstream backend_upstream {
        server backend:8080;
        keepalive 32;
    }

    upstream frontend_upstream {
        server frontend:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Request-Id $request_id always;

        # Only the health probes are reachable through the public edge. Deeper actuator
        # paths (metrics, prometheus, env, etc.) are intentionally NOT proxied here — a
        # Prometheus server or other internal-network client scrapes those directly
        # against the backend container's actuator port, never through this proxy. See
        # docs/deployment/infrastructure-guide.md for the monitoring network layout.
        location ~ ^/actuator/health {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
        }

        location ~ ^/(api|v3/api-docs|swagger-ui) {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
        }

        location /_next/static/ {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
        }
    }
}
