# Production edge configuration for BachatSetu: a single reverse proxy in front of the
# frontend (Next.js standalone server) and backend (Spring Boot) containers.
#
# Responsibilities kept here, deliberately not duplicated in the application containers:
#   - TLS termination (certificate paths are placeholders — see
#     docs/deployment/production-deployment-guide.md for how they are provisioned)
#   - gzip compression for text-based responses
#   - long-lived cache headers for hashed Next.js static assets
#   - a small set of defense-in-depth security headers
#   - routing: everything under /api, /actuator, /v3/api-docs, /swagger-ui goes to the
#     backend; everything else goes to the frontend
#
# See docs/deployment/docker-guide.md for how this file is mounted into the `nginx`
# service defined in docker-compose.prod.yml.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 10m;

    log_format main '$remote_addr - $req_id [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    # Forward the client/ALB-supplied X-Request-Id if present, else mint one. Named $req_id
    # (not $request_id) because nginx core already defines a built-in $request_id variable —
    # reusing that name here would silently shadow the client-supplied value.
    map $http_x_request_id $req_id {
        default   $http_x_request_id;
        ""        $request_id;
    }

    # The ALB terminates TLS and sets X-Forwarded-Proto on the original request; nginx itself
    # only ever speaks plain HTTP (see file header), so $scheme here is always "http" and must
    # never be used directly — doing so would overwrite the ALB's "https" value and silently
    # stop the backend's Strict-Transport-Security header from ever being sent (it's only
    # emitted for requests the app considers secure). Fall back to $scheme only when no
    # upstream proxy supplied the header at all (e.g. direct access during local testing).
    map $http_x_forwarded_proto $forwarded_proto {
        default   $http_x_forwarded_proto;
        ""        $scheme;
    }

    upstream backend_upstream {
        server backend:8080;
        keepalive 32;
    }

    upstream frontend_upstream {
        server frontend:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Strip whatever the upstream (Spring Security's own header defaults, Next.js's
        # next.config.ts headers()) already set for these, so the edge is the single source
        # of truth and clients never see the same header duplicated on the response.
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Request-Id $req_id always;

        # Only the health probes are reachable through the public edge. Deeper actuator
        # paths (metrics, prometheus, env, etc.) are intentionally NOT proxied here — a
        # Prometheus server or other internal-network client scrapes those directly
        # against the backend container's actuator port, never through this proxy. See
        # docs/deployment/infrastructure-guide.md for the monitoring network layout.
        location ~ ^/actuator/health(/|$) {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Request-Id $req_id;
        }

        location ~ ^/(api(/|$)|v3/api-docs(/|$)|swagger-ui) {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Request-Id $req_id;
        }

        location /_next/static/ {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Request-Id $req_id;
        }
    }
}
