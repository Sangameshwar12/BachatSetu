version: 2
updates:
  - package-ecosystem: maven
    directory: /services/backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
      - backend
    groups:
      spring:
        patterns:
          - org.springframework*
      testing:
        patterns:
          - org.junit*
          - org.mockito*
          - org.testcontainers*
          - com.tngtech.archunit*
    ignore:
      - dependency-name: "*"
        versions:
          - "*-SNAPSHOT"
          - "*-M*"
          - "*-RC*"
          - "*-alpha*"
          - "*-beta*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - ci
