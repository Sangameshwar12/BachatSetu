name: Frontend CI

on:
  pull_request:
    paths:
      - "services/web/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "services/web/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  verify:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/web/package-lock.json

      - name: Install dependencies
        working-directory: services/web
        run: npm ci

      - name: Lint
        working-directory: services/web
        run: npm run lint

      - name: Test
        working-directory: services/web
        run: npm run test

      - name: Build
        working-directory: services/web
        run: npm run build
