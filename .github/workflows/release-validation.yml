name: Release Validation

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate Semantic Version Tag
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate tag format
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must follow vMAJOR.MINOR.PATCH or a SemVer pre-release form."
            exit 1
          fi

  verify-backend:
    name: Verify Release Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run release quality gates
        working-directory: services/backend
        run: mvn -B -ntp clean verify

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-reports
          if-no-files-found: warn
          path: |
            services/backend/target/surefire-reports/
            services/backend/target/checkstyle-result.xml
            services/backend/target/pmd.xml
            services/backend/target/spotbugsXml.xml
            services/backend/target/site/jacoco/
