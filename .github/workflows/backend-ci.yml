name: Backend CI

on:
  pull_request:
    paths:
      - "services/backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "services/backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  verify:
    name: Build and Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify
        working-directory: services/backend
        run: mvn -B -ntp clean verify

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-reports
          if-no-files-found: warn
          path: |
            services/backend/target/checkstyle-result.xml
            services/backend/target/pmd.xml
            services/backend/target/spotbugsXml.xml
            services/backend/target/site/jacoco/
