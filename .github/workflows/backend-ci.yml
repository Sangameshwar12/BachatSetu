name: Backend CI

on:
  pull_request:
    paths:
      - "services/backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "services/backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  verify:
    name: Maven Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify
        working-directory: services/backend
        run: mvn -B -ntp clean verify
