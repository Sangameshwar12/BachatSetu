name: Bug report
description: Report a reproducible defect in BachatSetu
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Use the private process in SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the defect and the affected workflow.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal, deterministic steps and safe test data.
      placeholder: |
        1. Start with...
        2. Perform...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and evidence
      description: Add sanitized logs, screenshots, or correlation IDs. Remove secrets and personal data.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include environment, revision/version, operating system, Java version, browser/device, and relevant provider.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Operational severity
      options:
        - Low - minor inconvenience
        - Medium - workflow degraded
        - High - critical workflow unavailable
        - Critical - financial integrity or widespread outage risk
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Reporter checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed secrets, credentials, and personal data.
          required: true
        - label: This is not a security vulnerability.
          required: true
