# Production orchestration for BachatSetu: PostgreSQL, Redis, the backend, the frontend,
# and an Nginx edge reverse proxy — the only service that publishes a host port.
#
# Every secret is read from the environment / a .env file next to this compose file;
# nothing here has a working default, by design (see
# docs/deployment/environment-variables-guide.md for the full reference and
# docs/deployment/production-checklist.md before using this file against real
# infrastructure). Copy .env.prod.example to .env and fill in every value first:
#
#   cp .env.prod.example .env
#   docker compose -f docker-compose.prod.yml up -d --build
#
# TLS termination is expected to happen in front of this stack (an AWS Application Load
# Balancer with an ACM certificate, or an equivalent), not inside the `nginx` service —
# see docs/deployment/infrastructure-guide.md. `nginx` here terminates plain HTTP on the
# internal network the load balancer forwards to.
#
# `prometheus` and `grafana` — the monitoring stack added in Sprint 9.1 (see
# docs/deployment/monitoring-guide.md) — bind only to 127.0.0.1 on the host, on top of already
# being on the internal-only `bachatsetu-internal` network: nginx does not proxy them, and the
# ALB never reaches them either. Reach Grafana from a workstation via an SSH port-forward to the
# host (see the monitoring guide), never by opening a port on the load balancer or security group.

name: bachatsetu-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:?DATABASE_NAME is required}
      POSTGRES_USER: ${DATABASE_USERNAME:?DATABASE_USERNAME is required}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - bachatsetu-internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - bachatsetu-internal

  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/${DATABASE_NAME:?DATABASE_NAME is required}
      DATABASE_USERNAME: ${DATABASE_USERNAME:?DATABASE_USERNAME is required}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      DATABASE_MAX_POOL_SIZE: ${DATABASE_MAX_POOL_SIZE:-30}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TENANT_DEFAULT_ID: ${TENANT_DEFAULT_ID:?TENANT_DEFAULT_ID is required}
      AUDIT_SYSTEM_ACTOR_ID: ${AUDIT_SYSTEM_ACTOR_ID:?AUDIT_SYSTEM_ACTOR_ID is required}
      AUTH_JWT_SIGNING_SECRET: ${AUTH_JWT_SIGNING_SECRET:?AUTH_JWT_SIGNING_SECRET is required}
      AUTH_CORS_ALLOWED_ORIGINS: ${AUTH_CORS_ALLOWED_ORIGINS:?AUTH_CORS_ALLOWED_ORIGINS is required}
      # TEMPORARY MVP TEST OTP — REMOVE BEFORE PRODUCTION. Leave false. true makes every
      # generated OTP the fixed code 102030 for every user — MVP/demo only, never a real launch.
      AUTH_OTP_TEST_MODE: ${AUTH_OTP_TEST_MODE:-false}
      # Deployment-mode switches, independent of SPRING_PROFILES_ACTIVE — false (the default)
      # means log-only delivery, suitable for an MVP with no real SMS/email provider yet. Flip
      # to true, and fill in the selected provider's credentials below, when ready to send real
      # SMS/email — no code or compose change needed. See docs/deployment/environment-variables-guide.md.
      SMS_PROVIDER_ENABLED: ${SMS_PROVIDER_ENABLED:-false}
      EMAIL_PROVIDER_ENABLED: ${EMAIL_PROVIDER_ENABLED:-false}
      SMS_PROVIDER: ${SMS_PROVIDER:-MSG91}
      SMS_RETRY_COUNT: ${SMS_RETRY_COUNT:-2}
      SMS_CONNECT_TIMEOUT: ${SMS_CONNECT_TIMEOUT:-3s}
      SMS_READ_TIMEOUT: ${SMS_READ_TIMEOUT:-5s}
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-}
      MSG91_TEMPLATE_ID: ${MSG91_TEMPLATE_ID:-}
      MSG91_SENDER_ID: ${MSG91_SENDER_ID:-}
      FAST2SMS_API_KEY: ${FAST2SMS_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-AWS_SES}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      EMAIL_RETRY_COUNT: ${EMAIL_RETRY_COUNT:-2}
      EMAIL_CONNECT_TIMEOUT: ${EMAIL_CONNECT_TIMEOUT:-3s}
      EMAIL_READ_TIMEOUT: ${EMAIL_READ_TIMEOUT:-5s}
      AWS_SES_REGION: ${AWS_SES_REGION:-}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_SECRET: ${RAZORPAY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CASHFREE_CLIENT_ID: ${CASHFREE_CLIENT_ID:-}
      CASHFREE_CLIENT_SECRET: ${CASHFREE_CLIENT_SECRET:-}
      CASHFREE_WEBHOOK_SECRET: ${CASHFREE_WEBHOOK_SECRET:-}
      STORAGE_DEFAULT_PROVIDER: ${STORAGE_DEFAULT_PROVIDER:-LOCAL}
      STORAGE_LOCAL_PATH: ${STORAGE_LOCAL_PATH:-./data/storage}
      STORAGE_AWS_BUCKET: ${STORAGE_AWS_BUCKET:-}
      STORAGE_AWS_REGION: ${STORAGE_AWS_REGION:-}
      STORAGE_AWS_ACCESS_KEY_ID: ${STORAGE_AWS_ACCESS_KEY_ID:-}
      STORAGE_AWS_SECRET_ACCESS_KEY: ${STORAGE_AWS_SECRET_ACCESS_KEY:-}
      # Also defaults to off for the same MVP reason — no real payment gateway credentials
      # required until this is explicitly turned on.
      PAYMENT_GATEWAY_ENABLED: ${PAYMENT_GATEWAY_ENABLED:-false}
      PAYMENT_GATEWAY_DEFAULT_PROVIDER: ${PAYMENT_GATEWAY_DEFAULT_PROVIDER:-RAZORPAY}
      JAVA_OPTS: -XX:MaxRAMPercentage=70.0 -XX:InitialRAMPercentage=50.0 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError
    volumes:
      - backend-prod-storage:/app/data/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2048m
    networks:
      - bachatsetu-internal

  frontend:
    build:
      context: ./services/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - bachatsetu-internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - bachatsetu-internal

  # --- Monitoring (Sprint 9.1) --- see docs/deployment/monitoring-guide.md for the full guide.
  # Neither service is proxied by nginx or reachable through the load balancer; both bind only to
  # 127.0.0.1 on the host, reachable solely via an SSH tunnel into the host itself.

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-prod-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - bachatsetu-internal

  grafana:
    image: grafana/grafana-oss:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
    volumes:
      - grafana-prod-data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana-dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      prometheus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - bachatsetu-internal

networks:
  bachatsetu-internal:
    driver: bridge

volumes:
  postgres-prod-data:
  redis-prod-data:
  backend-prod-storage:
  prometheus-prod-data:
  grafana-prod-data:
